spring:
  application:
    name: Super-ai-agent
  profiles:
    active: local
#  main:
#    allow-bean-definition-overriding: true
#  ai:
#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        model: deepseek-r1:8b
#        options:
#          temperature: 0.7
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi文档配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.monuo.superaiagent.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
